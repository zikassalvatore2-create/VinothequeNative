name: Build Native Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
      continue-on-error: true
        
    - name: Show errors if failed
      if: always()
      run: |
        echo "=== KOTLIN ERRORS ==="
        grep -n "^e:" build.log || echo "No errors found"
        echo ""
        echo "=== LAST 80 LINES ==="
        tail -80 build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
